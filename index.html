    <style>

            --bg: #0d0808;
            --cork: #8B7355;
            --cork-dark: #6B5340;
            --cork-light: #A0896E;
            --red-thread: #c41e3a;
            --red-dark: #8B0000;
            --yellow-sticky: #FFD700;
            --paper: #e8dcc8;
            --paper-dark: #d4c5a9;
            --text-dark: #1a1a1a;
            --text-body: #c4b9a8;
            --stamp-red: #d32f2f;
            --shadow: rgba(0,0,0,0.7);
            --flashlight-size: 350px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-body);
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            cursor: none;
            overflow-x: hidden;
            min-height: 100vh;
            user-select: none;

        /* ==================== ФОНАРИК ==================== */
        #flashlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            background: radial-gradient(
                circle var(--flashlight-size) at var(--mouse-x, 50%) var(--mouse-y, 50%),
                transparent 0%,
                transparent 30%,
                rgba(0,0,0,0.6) 60%,
                rgba(0,0,0,0.92) 100%
            );
            transition: background 0.08s ease-out;
        }

        #flashlight-ring {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            width: var(--flashlight-size);
            height: var(--flashlight-size);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 200, 0.15);
            box-shadow: 
                0 0 60px rgba(255, 255, 200, 0.1),
                inset 0 0 60px rgba(255, 255, 200, 0.05);
            transform: translate(-50%, -50%);
            top: var(--mouse-y, 50%);
            left: var(--mouse-x, 50%);
            transition: all 0.04s linear;
        }

        /* ==================== ШАПКА ==================== */
        #header {
            position: relative;
            z-index: 10;
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid var(--red-thread);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }

        #header h1 {
            font-family: 'Rubik Dirt', cursive;
            font-size: clamp(2rem, 5vw, 4rem);
            color: var(--stamp-red);
            text-shadow: 0 0 30px rgba(200,0,0,0.6), 0 4px 8px rgba(0,0,0,0.8);

            letter-spacing: 4px;
            margin-top: 0.5rem;
        }

        #header .badge-count {
            display: inline-block;
            background: var(--stamp-red);
            color: #fff;
            padding: 0.4rem 1.5rem;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 1rem;
            transform: rotate(-2deg);
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
        }

        /* ==================== ПАНЕЛЬ КАТЕГОРИЙ ==================== */
        #category-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            border-bottom: 1px solid #222;
        }

        .cat-btn {
            padding: 0.6rem 1.2rem;

            border: 1px solid #333;
            color: #888;
            cursor: pointer;
            font-family: 'Special Elite', 'Courier New', monospace;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .cat-btn:hover {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .cat-btn.active {
            background: var(--stamp-red);
            border-color: var(--stamp-red);
            color: #fff;
            box-shadow: 0 0 20px rgba(200,0,0,0.4);
        }

        /* ==================== ДОСКА ==================== */
        #evidence-board {
            position: relative;
            z-index: 5;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139,115,85,0.08) 2px,
                    rgba(139,115,85,0.08) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(139,115,85,0.05) 2px,
                    rgba(139,115,85,0.05) 4px
                ),
                radial-gradient(ellipse at center, #2a1f18 0%, #0d0808 100%);
            min-height: 100vh;
        }

        /* ==================== КАРТОЧКА ДЕЛА ==================== */
        .case-card {
            position: relative;
            background: var(--paper);
            color: var(--text-dark);
            padding: 0;
            cursor: pointer;
            box-shadow: 
                3px 3px 10px rgba(0,0,0,0.6),
                0 0 0 1px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotate(var(--card-rot, 0deg));
            pointer-events: auto;
            overflow: hidden;
        }

        .case-card:hover {
            transform: rotate(0deg) scale(1.05);
            box-shadow: 
                8px 8px 25px rgba(0,0,0,0.8),
                0 0 0 3px var(--stamp-red),
                0 0 40px rgba(200,0,0,0.3);
            z-index: 20;
        }

        .case-card .pin {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ff4444, #8B0000);
            border-radius: 50%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .case-card .pin::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }

        .case-card .photo {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.2);
            transition: all 0.5s;
            border-bottom: 2px solid rgba(0,0,0,0.2);
        }

        .case-card:hover .photo {
            filter: grayscale(0%) contrast(1);
        }

        .case-card .case-info {
            padding: 1rem;
        }

        .case-card .case-number {
            font-family: 'Special Elite', monospace;
            font-size: 0.8rem;
            color: var(--stamp-red);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .case-card .case-title {
            font-family: 'Special Elite', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 0.4rem 0;
            line-height: 1.3;
        }

        .case-card .case-location {
            font-size: 0.75rem;
            color: #666;
            letter-spacing: 1px;
        }

        .case-card .case-status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            border: 1px solid #000;
        }

        .status-unsolved { background: #1a1a1a; color: #f44; border-color: #f44; }
        .status-solved { background: #1a2a1a; color: #4f4; border-color: #4f4; }
        .status-partial { background: #2a2a00; color: #ff0; border-color: #ff0; }

        /* ==================== КРАСНЫЕ НИТИ (SVG) ==================== */
        #threads-svg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 6;
        }

        .thread-line {
            stroke: var(--red-thread);
            stroke-width: 1.5;
            opacity: 0.3;
            stroke-dasharray: 8 4;
            animation: thread-pulse 3s infinite;
        }

        @keyframes thread-pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }

        /* ==================== МОДАЛЬНОЕ ОКНО СТАТЬИ ==================== */
        #case-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.93);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: auto;
        }

        #case-modal.active {
            display: flex;
        }

        #modal-content {
            background: #1a1410;
            border: 2px solid #333;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2.5rem;
            position: relative;
            box-shadow: 
                0 0 100px rgba(0,0,0,0.9),
                0 0 0 1px rgba(139,0,0,0.3);
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            color: #c4b9a8;
            line-height: 1.8;
        }

        #modal-content h2 {
            font-family: 'Special Elite', monospace;
            font-size: 2rem;
            color: var(--stamp-red);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(200,0,0,0.4);
        }

        #modal-content .modal-meta {
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #222;
        }

        #modal-content h3 {
            font-family: 'Special Elite', monospace;
            color: #ccc;
            margin: 1.5rem 0 0.5rem;
            font-size: 1.3rem;
            border-left: 4px solid var(--stamp-red);
            padding-left: 1rem;
        }

        #modal-content p {
            margin: 0.8rem 0;
            text-indent: 2rem;
        }

        #modal-content .sticky-note {
            background: var(--yellow-sticky);
            color: #1a1a1a;
            padding: 1rem 1.5rem;
            margin: 1rem 0;
            font-family: 'Special Elite', monospace;
            font-size: 0.9rem;
            transform: rotate(1deg);
            box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
            border-left: none;
        }

        #modal-close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
        }

        #modal-close:hover {
            color: var(--stamp-red);
            transform: scale(1.2);
        }

        /* ==================== СТИКЕРЫ НА ДОСКЕ ==================== */
        .sticker-note {
            position: absolute;
            background: var(--yellow-sticky);
            color: #1a1a1a;
            padding: 0.5rem 0.8rem;
            font-family: 'Special Elite', monospace;
            font-size: 0.7rem;
            transform: rotate(-3deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
            z-index: 7;
            pointer-events: none;
        }

        /* ==================== СКРОЛЛБАР ==================== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: var(--stamp-red); }

        /* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
        @media (max-width: 768px) {
            body { cursor: auto; }
            #flashlight { display: none; }
            #flashlight-ring { display: none; }
            #evidence-board {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            .case-card { transform: none; }
            #modal-content { padding: 1.2rem; width: 95%; }
            #modal-content h2 { font-size: 1.4rem; }
            #category-nav { gap: 0.3rem; padding: 0.5rem; }
            .cat-btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; letter-spacing: 0; }
            #header h1 { font-size: 1.5rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <!-- ФОНАРИК -->
    <div id="flashlight"></div>
    <div id="flashlight-ring"></div>

    <!-- ШАПКА -->
    <div id="header">
        <h1>ДОСЬЕ</h1>
        <div class="subtitle">ГЛОБАЛЬНЫЙ АРХИВ НЕРАСКРЫТЫХ ДЕЛ</div>
        <div class="badge-count">100 ДЕЛ • 5 КАТЕГОРИЙ • 1 ИСТИНА</div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div id="category-nav">
        <button class="cat-btn active" data-cat="all">ВСЕ ДЕЛА</button>
        <button class="cat-btn" data-cat="murder">🔴 УБИЙСТВА</button>
        <button class="cat-btn" data-cat="missing">🟡 ИСЧЕЗНОВЕНИЯ</button>
        <button class="cat-btn" data-cat="conspiracy">🟠 ЗАГОВОРЫ</button>
        <button class="cat-btn" data-cat="paranormal">🟣 ПАРАНОРМАЛЬНОЕ</button>
        <button class="cat-btn" data-cat="racial">⚫ РАСОВЫЕ ДЕЛА</button>
    </div>

    <!-- ДОСКА -->
    <div id="evidence-board"></div>

    <!-- SVG ДЛЯ НИТЕЙ -->
    <svg id="threads-svg"></svg>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="case-modal">
        <div id="modal-content">
            <button id="modal-close">✕</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
    // ============================================================
    // БАЗА ДАННЫХ: 100 ДЕЛ
    // ============================================================
    const cases = [
        // ===== УБИЙСТВА (25) =====
        {
            id: 1, cat: 'murder', title: 'Джек Потрошитель', location: 'Лондон, 1888',
            status: 'unsolved', year: 1888,
            photo: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250"><rect fill="#1a0a0a" width="400" height="250"/><text fill="#8B0000" x="200" y="130" text-anchor="middle" font-size="60" font-family="serif">?</text></svg>'),
            article: `
                <h2>ДЖЕК ПОТРОШИТЕЛЬ</h2>
                <div class="modal-meta">ДЕЛО №1 • ЛОНДОН, УАЙТЧЕПЕЛ • 1888 • СТАТУС: НЕ РАСКРЫТО</div>
                
                <h3>ОБСТОЯТЕЛЬСТВА</h3>
                <p>Осень 1888 года. Лондонский район Уайтчепел — трущобы, проституция, нищета. В период с августа по ноябрь неизвестный совершает серию жесточайших убийств. Пять жертв — Мэри Энн Николз, Энни Чэпмен, Элизабет Страйд, Кэтрин Эддоус и Мэри Джейн Келли — признаны «каноническими» жертвами Потрошителя. Все они были проститутками. У всех было перерезано горло. У большинства — извлечены внутренние органы.</p>
                <p>Убийца действовал с хирургической точностью. Это породило теорию, что он был врачом или мясником. Полиция получила сотни писем от «Потрошителя», включая знаменитое письмо «Из ада» с половиной человеческой почки.</p>
                
                <div class="sticky-note">
                    📋 КЛЮЧЕВОЙ ФАКТ: Письмо «Из ада» содержало фрагмент почки, которая, по утверждению отправителя, принадлежала Кэтрин Эддоус. Экспертиза не смогла подтвердить или опровергнуть это.
                </div>

                <h3>ПОДОЗРЕВАЕМЫЕ</h3>
                <p>За 130+ лет список подозреваемых разросся до сотен имён: Монтегю Друитт (адвокат, найден мёртвым в Темзе), Северин Клосовски (парикмахер-отравитель), Аарон Космински (польский эмигрант с психическим расстройством), Джеймс Мэйбрик (торговец хлопком), принц Альберт Виктор (внук королевы Виктории), Льюис Кэрролл (писатель) и даже Уолтер Сикерт (художник).</p>
                <p>В 2019 году анализ ДНК с шали Кэтрин Эддоус указал на Космински. Однако методология исследования была раскритикована, и результаты не признаны окончательными.</p>

                <h3>ПОЧЕМУ ЭТО СТРАШНО</h3>
                <p>Дело Джека Потрошителя — это не просто убийства. Это рождение современного серийного убийцы как феномена. Это дело, которое показало: монстр может жить среди нас, и полиция может быть абсолютно бессильна. Потрошитель не был пойман, несмотря на всю мощь Скотланд-Ярда, несмотря на облавы, допросы и лучших детективов эпохи.</p>
                <p>Самое жуткое: он просто перестал убивать. Последнее убийство — Мэри Джейн Келли — было самым жестоким. И после этого — тишина. Смерть? Тюрьма за другое преступление? Или он просто насытился?</p>
                
                <div class="sticky-note">
                    💀 ТЕОРИЯ: Некоторые исследователи считают, что Потрошитель был не одним человеком, а группой. Или что полиция знала, кто это, но скрыла из-за связей убийцы с королевской семьёй.
                </div>
            `
        },
        {
            id: 2, cat: 'murder', title: 'Чёрный Георгин (Элизабет Шорт)', location: 'Лос-Анджелес, 1947',
            status: 'unsolved', year: 1947,
            photo: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250"><rect fill="#0a0a1a" width="400" height="250"/><text fill="#8B0000" x="200" y="130" text-anchor="middle" font-size="50" font-family="serif">BLACK DAHLIA</text></svg>'),
            article: `
                <h2>ЧЁРНЫЙ ГЕОРГИН</h2>
                <div class="modal-meta">ДЕЛО №2 • ЛОС-АНДЖЕЛЕС • 1947 • СТАТУС: НЕ РАСКРЫТО</div>
                
                <h3>ОБСТОЯТЕЛЬСТВА</h3>
                <p>15 января 1947 года. Утро. Женщина гуляет с ребёнком по району Леймерт-Парк в Лос-Анджелесе. На пустыре она замечает что-то белое. Подойдя ближе, она понимает: это тело. Разрезанное пополам. Обескровленное. С разрезанным от уха до уха ртом — «улыбка Глазго».</p>
                <p>Жертву опознали как 22-летнюю Элизабет Шорт. Она приехала в Голливуд в поисках славы. Вместо славы она получила самое жестокое убийство в истории Калифорнии. Тело было вымыто, обескровлено и разрезано с хирургической точностью — как будто убийца знал анатомию.</p>
                <p>Полиция допросила сотни подозреваемых. Некоторые признавались — но их алиби подтверждались. Дело превратилось в медийный цирк: газеты окрестили Элизабет «Чёрным Георгином» за её любовь к чёрной одежде.</p>
                
                <div class="sticky-note">
                    📋 ЖУТКАЯ ДЕТАЛЬ: Тело было разрезано пополам в районе талии с такой точностью, что позвоночник был перерезан между двумя позвонками. Никаких следов борьбы. Никакой крови на месте обнаружения — её убили в другом месте.
                </div>

                <h3>ПОДОЗРЕВАЕМЫЕ</h3>

                <p>Нацисты вдохновлялись американской евгеникой при создании своих расовых законов. Американские учёные консультировали нацистов.</p>
                
                <div class="sticky-note">
                    🇩🇪 НАЦИСТЫ: Гитлер писал письма американским евгенистам, восхищаясь их работой. Американская модель стерилизации легла в основу нацистских законов.
                </div>

                <h3>ПОЧЕМУ ЭТО СТРАШНО</h3>
                <p>Собственное правительство стерилизовало людей, чтобы «улучшить расу». И нацисты учились у Америки.</p>
            `
        },
        {
            id: 100, cat: 'racial', title: 'Современный расизм', location: 'Глобально, настоящее',
            status: 'unsolved', year: null,
            photo: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250"><rect fill="#0a0a0a" width="400" height="250"/><text fill="#fff" x="200" y="130" text-anchor="middle" font-size="25" font-family="serif">SYSTEMIC RACISM</text></svg>'),
            article: `
                <h2>СОВРЕМЕННЫЙ РАСИЗМ</h2>
                <div class="modal-meta">ДЕЛО №100 • ГЛОБАЛЬНО • СТАТУС: ПРОДОЛЖАЕТСЯ</div>
                
                <h3>КОНТЕКСТ</h3>
                <p>Расизм не закончился с отменой апартеида или законов Джима Кроу. Он эволюционировал. Системный расизм встроен в институты: неравенство в здравоохранении, образовании, правосудии. Чернокожие в США получают более длительные сроки за те же преступления. Им труднее получить ипотеку. Их чаще убивает полиция. Микроагрессия — ежедневные унижения и стереотипы.</p>
                <p>В Европе — исламофобия, антисемитизм, дискриминация мигрантов. Расизм — не просто предрассудки отдельных людей. Это система.</p>
                
                <div class="sticky-note">
                    ⚖️ ПРАВОСУДИЕ: Чернокожий американец в 5 раз чаще попадает в тюрьму, чем белый, за то же преступление. Это не мнение. Это статистика.
                </div>

                <h3>ПОЧЕМУ ЭТО СТРАШНО</h3>
                <p>Расизм — не прошлое. Это настоящее. И он не исчезнет сам. Система защищает себя.</p>
            `
        }
    ];

    // ============================================================
    // ФОНАРИК
    // ============================================================
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let targetX = mouseX;
    let targetY = mouseY;

    document.addEventListener('mousemove', (e) => {
        targetX = e.clientX;
        targetY = e.clientY;
    });

    document.addEventListener('touchmove', (e) => {
        targetX = e.touches[0].clientX;
        targetY = e.touches[0].clientY;
    }, { passive: true });

    function updateFlashlight() {
        mouseX += (targetX - mouseX) * 0.15;
        mouseY += (targetY - mouseY) * 0.15;
        const root = document.documentElement;
        root.style.setProperty('--mouse-x', mouseX + 'px');
        root.style.setProperty('--mouse-y', mouseY + 'px');
        requestAnimationFrame(updateFlashlight);
    }
    updateFlashlight();

    // ============================================================
    // ОТРИСОВКА ДОСКИ
    // ============================================================
    let currentFilter = 'all';

    function renderBoard(filter) {
        const board = document.getElementById('evidence-board');
        board.innerHTML = '';
        const filtered = filter === 'all' ? cases : cases.filter(c => c.cat === filter);

        filtered.forEach(c => {
            const card = document.createElement('div');
            card.className = 'case-card';
            card.dataset.cat = c.cat;
            card.dataset.id = c.id;
            const rotation = (Math.random() - 0.5) * 4;
            card.style.setProperty('--card-rot', rotation + 'deg');
            card.onclick = () => openCase(c);

            let statusClass = 'status-unsolved';
            let statusText = 'НЕ РАСКРЫТО';
            if (c.status === 'solved') { statusClass = 'status-solved'; statusText = 'РАСКРЫТО'; }
            else if (c.status === 'partial') { statusClass = 'status-partial'; statusText = 'ЧАСТИЧНО'; }

            card.innerHTML = `
                <div class="pin"></div>
                <div class="photo" style="background-image: url('${c.photo}'); background-color: #1a1a1a;"></div>
                <div class="case-info">
                    <div class="case-number">ДЕЛО №${c.id}</div>
                    <div class="case-title">${c.title}</div>
                    <div class="case-location">📍 ${c.location}</div>
                    <div class="case-status ${statusClass}">${statusText}</div>
                </div>
            `;
            board.appendChild(card);
        });

        drawThreads();
    }

    // ============================================================
    // НИТИ
    // ============================================================
    function drawThreads() {
        const svg = document.getElementById('threads-svg');
        svg.innerHTML = '';
        const cards = document.querySelectorAll('.case-card');
        if (cards.length < 2) return;

        for (let i = 0; i < Math.min(cards.length, 40); i++) {
            const j = (i + 1) % cards.length;
            const rect1 = cards[i].getBoundingClientRect();
            const rect2 = cards[j].getBoundingClientRect();
            const x1 = rect1.left + rect1.width / 2;
            const y1 = rect1.top + rect1.height / 2;
            const x2 = rect2.left + rect2.width / 2;
            const y2 = rect2.top + rect2.height / 2;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('class', 'thread-line');
            svg.appendChild(line);
        }
    }

    window.addEventListener('resize', drawThreads);
    window.addEventListener('scroll', drawThreads);

    // ============================================================
    // ОТКРЫТИЕ ДЕЛА
    // ============================================================
    function openCase(c) {
        const modal = document.getElementById('case-modal');
        const body = document.getElementById('modal-body');
        body.innerHTML = c.article;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('case-modal').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('case-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('case-modal')) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    // ============================================================
    // НАВИГАЦИЯ ПО КАТЕГОРИЯМ
    // ============================================================
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.cat;
            renderBoard(currentFilter);
            document.getElementById('evidence-board').scrollIntoView({ behavior: 'smooth' });
        });
    });

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================================
    renderBoard('all');

    // Анимированный счётчик в шапке
    let count = 0;
    const counterEl = document.querySelector('.badge-count');
    if (counterEl) {
        const interval = setInterval(() => {
            count += 5;
            if (count >= 100) { count = 100; clearInterval(interval); }
            counterEl.textContent = `${count} ДЕЛ • 5 КАТЕГОРИЙ • 1 ИСТИНА`;
        }, 80);
    }

    // Стикеры на доске
    function addStickers() {
        const board = document.getElementById('evidence-board');
        const stickers = ['ВСЁ СВЯЗАНО', 'ИЩИ НИТИ', 'КТО СЛЕДУЮЩИЙ?', 'ПРАВДА ГДЕ-ТО РЯДОМ', 'НЕ ВЕРЬ ОФИЦИАЛЬНОЙ ВЕРСИИ', 'ДЕЛА СВЯЗАНЫ'];
        stickers.forEach((text, i) => {
            setTimeout(() => {
                const sticker = document.createElement('div');
                sticker.className = 'sticker-note';
                sticker.textContent = text;
                sticker.style.top = (10 + Math.random() * 80) + '%';
                sticker.style.left = (5 + Math.random() * 85) + '%';
                sticker.style.transform = `rotate(${(Math.random()-0.5)*8}deg)`;
                board.appendChild(sticker);
            }, 2000 + i * 500);
        });
    }
    setTimeout(addStickers, 3000);

    console.log('%cДОСЬЕ: ГЛОБАЛЬНЫЙ АРХИВ',
        'color: #c41e3a; font-size: 2rem; font-family: monospace;');
    console.log('%c100 дел. 5 категорий. 1 истина.',
        'color: #888; font-family: monospace;');
    console.log('%cВсе дела реальны. Некоторые — нераскрыты до сих пор.',
        'color: #666; font-style: italic;');
    </script>
</body>
